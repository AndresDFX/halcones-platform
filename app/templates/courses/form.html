{% extends "base.html" %}
{% block title %}{{ 'Editar' if curso else 'Nuevo' }} curso · {{ APP_NAME }}{% endblock %}
{% block page_title %}{{ 'Editar curso' if curso else 'Nuevo curso' }}{% endblock %}

{% block content %}
<div class="card" style="max-width:820px">
<form method="post" action="{{ ('/cursos/' ~ curso.id ~ '/editar') if curso else '/cursos/nuevo' }}">
  <div class="form-grid">
    <div class="field"><label>Código <span class="req">*</span></label>
      <input type="text" name="codigo" value="{{ curso.codigo if curso }}" placeholder="AFF-01" required></div>
    <div class="field"><label>Modalidad <span class="req">*</span></label>
      <input type="text" name="modalidad" value="{{ curso.modalidad if curso }}" placeholder="AFF / Tándem / Wingsuit" required></div>
    <div class="field full"><label>Nombre del curso <span class="req">*</span></label>
      <input type="text" name="nombre" value="{{ curso.nombre if curso }}" required></div>
    <div class="field full"><label>Resumen</label>
      <input type="text" name="resumen" value="{{ curso.resumen if curso }}"></div>
    <div class="field full"><label>Descripción</label>
      <textarea name="descripcion" rows="4">{{ curso.descripcion if curso }}</textarea></div>
    <div class="field"><label>Niveles totales</label>
      <input type="number" name="niveles_total" value="{{ curso.niveles_total if curso else 7 }}"></div>
    <div class="field"><label>Altura de salto (ft)</label>
      <input type="number" name="altura_salto_ft" value="{{ curso.altura_salto_ft if curso else 10000 }}"></div>
    <div class="field"><label>Precio (COP)</label>
      <input type="text" class="money" name="precio" value="{{ (curso.precio|num) if curso else '' }}" placeholder="6.333.333"></div>
    <div class="field"><label>Reserva mínima (COP)</label>
      <input type="text" class="money" name="reserva_minima" value="{{ (curso.reserva_minima|num) if curso else '' }}" placeholder="2.000.000"></div>
    <div class="field"><label>Duración</label>
      <input type="text" name="duracion" value="{{ curso.duracion if curso }}" placeholder="7 saltos + teoría"></div>
    <div class="field full"><label>Incluye <span class="hint">(un ítem por línea)</span></label>
      <textarea name="incluye" rows="5">{{ curso.incluye if curso }}</textarea></div>
    <div class="field full"><label>Requisitos <span class="hint">(un ítem por línea)</span></label>
      <textarea name="requisitos" rows="4">{{ curso.requisitos if curso }}</textarea></div>
  </div>
  <div class="btn-row" style="align-items:center">
    {% if curso %}
    <label class="check"><input type="checkbox" name="activo" value="true" {{ 'checked' if curso.activo }}> Activo</label>
    {% endif %}
    <label class="check"><input type="checkbox" name="destacado" value="true" {{ 'checked' if curso and curso.destacado }}> Destacado</label>
    <div class="spacer" style="flex:1"></div>
    <a href="{{ ('/cursos/' ~ curso.id) if curso else '/cursos' }}" class="btn outline">Cancelar</a>
    <button class="btn" type="submit">Guardar curso</button>
  </div>
</form>
</div>
{% endblock %}
